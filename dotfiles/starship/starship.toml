add_newline = true
palette = "azrael"

format = """
$username$hostname$directory$git_branch$git_status$python$time
$character"""

[palettes.azrael]
bg = "#0D0F1A"
fg = "#E6EAF0"
muted = "#8B93A6"
red = "#b23a48"
purple = "#8B6FEF"
accent = "#E6B450"

[username]
show_always = true
format = "[\\[$user\\]](fg:muted) "

[hostname]
ssh_only = false
format = "[\\[$hostname\\]](fg:muted) "

[directory]
style = "fg:fg"
truncation_length = 3
truncation_symbol = "…/"
fish_style_pwd_dir_length = 1
format = "[$path]($style) "

[git_branch]
style = "fg:purple"
format = "[ $branch]($style) "

[git_status]
style = "fg:purple"
format = "[$all_status$ahead_behind]($style) "

[python]
style = "fg:accent"
format = "[ $virtualenv]($style) "
detect_extensions = ["py"]
detect_files = ["pyproject.toml", "requirements.txt", "poetry.lock", "Pipfile"]

[time]
disabled = false
time_format = "%H:%M"
style = "fg:muted"
format = "[󰥔 $time]($style) "

[character]
success_symbol = "[❯](fg:purple)"
error_symbol = "[❯](fg:red)"
