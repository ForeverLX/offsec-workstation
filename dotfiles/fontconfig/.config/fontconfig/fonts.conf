<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<!-- Fontconfig - NightForge
     JetBrains Mono + Iosevka Nerd Font priority
     Replaces DMS font stack with ilyamiro-inspired setup -->

<fontconfig>
  <!-- === FONT DIRS === -->
  <dir>~/.local/share/fonts</dir>
  <dir>/usr/share/fonts</dir>

  <!-- === FONT RENDERING (GTX 1650 - prioritize performance) === -->
  <match target="font">
    <edit name="antialias" mode="assign"><bool>true</bool></edit>
    <edit name="hinting" mode="assign"><bool>true</bool></edit>
    <edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
    <edit name="rgba" mode="assign"><const>rgb</const></edit>
    <edit name="lcdfilter" mode="assign"><const>lcdlight</const></edit>
  </match>

  <!-- === DEFAULT FONT: JetBrains Mono Nerd Font === -->
  <alias>
    <family>monospace</family>
    <prefer><family>JetBrainsMono Nerd Font Mono</family></prefer>
  </alias>

  <!-- === SANS-SERIF: Iosevka (for UI elements) === -->
  <alias>
    <family>sans-serif</family>
    <prefer><family>Iosevka Nerd Font</family></prefer>
  </alias>

  <!-- === SERIF FALLBACK === -->
  <alias>
    <family>serif</family>
    <prefer><family>Noto Serif</family></prefer>
  </alias>

  <!-- === EMOJI: Noto Emoji === -->
  <alias>
    <family>emoji</family>
    <prefer><family>Noto Color Emoji</family></prefer>
  </alias>

  <!-- === FONT PRIORITIES === -->
  <alias>
    <family>JetBrainsMono Nerd Font Mono</family>
    <default><family>monospace</family></default>
  </alias>

  <alias>
    <family>Iosevka Nerd Font</family>
    <default><family>sans-serif</family></default>
  </alias>

  <!-- === DISABLE BITMAP FONTS (avoid rendering issues) === -->
  <selectfont>
    <rejectfont>
      <pattern><patelt name="scalable"><bool>false</bool></patelt></pattern>
    </rejectfont>
  </selectfont>
</fontconfig>
