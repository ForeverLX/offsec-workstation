# Infra Layout
# Veil mesh management: local shell, cerberus, tairn

# ┌─────────────────────────────┐
# │                             │
# │      NightForge Local       │
# │          (top)              │
# ├──────────────┬──────────────┤
# │ ssh cerberus │  ssh tairn   │
# │ (bot-left)   │  (bot-right) │
# └──────────────┴──────────────┘

# Rename window
rename-window "Infra"

# Split into 3 panes
split-window -v -p 40
split-window -h -p 50
select-pane -t 0

# Local NightForge shell: ready
send-keys -t 0 'cd ~' C-m

# Cerberus pane
send-keys -t 1 'ssh cerberus' C-m

# Tairn pane
send-keys -t 2 'ssh tairn' C-m

select-pane -t 0
