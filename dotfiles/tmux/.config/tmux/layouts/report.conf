# Report Layout
# Report writing: nvim full width top, reference shell bottom

# ┌─────────────────────────────┐
# │                             │
# │          nvim               │
# │          (75%)              │
# │                             │
# ├─────────────────────────────┤
# │      Reference Shell        │
# │          (25%)              │
# └─────────────────────────────┘

# Rename window
rename-window "Report"

# Split into 2 panes
split-window -v -p 25

# nvim in top pane
send-keys -t 0 'cd ${PWD:-~}; nvim' C-m

# Reference shell: ready
send-keys -t 1 'cd ~' C-m

select-pane -t 0
