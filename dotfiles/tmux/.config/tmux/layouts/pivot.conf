# Pivot Layout
# Lateral movement and tunneling: C2/tunnel shell, lateral shell, network map notes

# ┌──────────────┬──────────────┐
# │              │  Lateral     │
# │  C2/Tunnel   │  Movement    │
# │  Shell (50%) │  (50% top)   │
# │              ├──────────────┤
# │              │  Network Map │
# │              │  (50% bot)   │
# └──────────────┴──────────────┘

# Rename window
rename-window "Pivot"

# Split into 3 panes
split-window -h -p 50
split-window -v -p 50
select-pane -t 0

# C2/tunnel pane: ready at ~
send-keys -t 0 'cd ~' C-m

# Lateral movement pane: ready at ~
send-keys -t 1 'cd ~' C-m

# Network map notes pane: ready at ~
send-keys -t 2 'cd ~' C-m

select-pane -t 0
