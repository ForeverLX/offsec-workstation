# Recon Layout
# Recon and enumeration: main shell, web/enum pane, notes pane

# ┌──────────────┬──────────────┐
# │              │  Web/Enum    │
# │   Main       │  (40% top)   │
# │   Shell      ├──────────────┤
# │   (60%)      │   Notes      │
# │              │  (40% bot)   │
# └──────────────┴──────────────┘

# Rename window
rename-window "Recon"

# Split into 3 panes
split-window -h -p 40
split-window -v -p 50
select-pane -t 0

# Main pane: ready at ~
send-keys -t 0 'cd ~' C-m

# Web/enum pane: ready at ~
send-keys -t 1 'cd ~' C-m

# Notes pane: open nvim notes.md
send-keys -t 2 'cd ${PWD:-~}; nvim notes.md' C-m

select-pane -t 0
