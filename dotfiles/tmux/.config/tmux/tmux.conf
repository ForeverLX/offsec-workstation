# NightForge Tmux Configuration
# Prefix: C-Space (avoid conflict with Niri Mod and Ghostty Cmd)

set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# Split panes
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize (Alt+arrows)
bind -n M-h resize-pane -L 2
bind -n M-j resize-pane -D 2
bind -n M-k resize-pane -U 2
bind -n M-l resize-pane -R 2

# Clipboard integration (Wayland)
set -g set-clipboard on
set -s copy-command 'wl-copy'
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy'
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'wl-copy'

# History
set -g history-limit 50000

# Status bar
set -g status-right "#($TMUX_PLUGIN_MANAGER_PATH/tmux-battery/scripts/battery.sh 2>/dev/null || echo '') | %H:%M"
set -g status-interval 5

# Mouse support
set -g mouse on

# Index starts at 1
set -g base-index 1
set -g pane-base-index 1

# Plugins via TPM
set -g @plugin 'tmux-plugins/tpm'

# Save/restore sessions
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Quick URL/file copy
set -g @plugin 'Morantron/tmux-fingers'
set -g @fingers-key 'F'

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'
