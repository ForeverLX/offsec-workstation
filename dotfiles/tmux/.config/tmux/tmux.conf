# === Identity ===
# offsec-workstation — operator-focused tmux config

# === Prefix ===
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# === Core behavior ===
set -g default-shell /bin/zsh
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g history-limit 200000
set -g escape-time 0
set -g display-time 2000
set -g status-interval 5
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"
setw -g automatic-rename off
set -g allow-rename off
set -g set-titles on
set -g set-clipboard on
set -s copy-command 'wl-copy'

# === Key bindings ===
# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "reloaded"

# Splits — preserve current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation (vim)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Window navigation
bind -r C-h previous-window
bind -r C-l next-window

# Quickly jump to last active window
bind Tab last-window

# Jump to marked pane (useful for reference pane while working)
bind \` switch-client -t'{marked}'

# Session switching
bind C-j switch-client -n
bind C-k switch-client -p

# === Copy mode (vi) ===
setw -g mode-keys vi
bind [ copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
bind -T copy-mode-vi r send-keys -X rectangle-toggle
bind p paste-buffer

# === Persistence ===
run-shell ~/.config/tmux/plugins/tmux-resurrect/resurrect.tmux
run-shell ~/.config/tmux/plugins/tmux-continuum/continuum.tmux

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# === Layouts ===
bind D run-shell "~/.config/tmux/layouts/daily.sh"
bind E run-shell "~/.config/tmux/layouts/engagement.sh"
bind V run-shell "~/.config/tmux/layouts/research.sh"

# === Status bar — Azrael brand colors ===
set -g status-position top
set -g status-style "bg=#0D0F1A fg=#E6EAF0"
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=#0D0F1A,bg=#8B6FEF,bold] #I:#W "
set -g pane-border-style "fg=#8B93A6"
set -g pane-active-border-style "fg=#8B6FEF"
set -g message-style "bg=#8B6FEF fg=#0D0F1A bold"
set -g pane-border-status off

# Left: session name + window count
set -g status-left "#[fg=#8B6FEF,bold] #S #[fg=#8B93A6]| #[fg=#E6EAF0]#{window_panes}p #W #[fg=#8B93A6]| "
set -g status-left-length 60

# Right: WireGuard indicator + music + datetime
set -g status-right "#(~/.local/bin/tmux-music.sh)#[fg=#8B93A6]  #[fg=#E6B450]%Y-%m-%d #[fg=#8B93A6]| #[fg=#8B6FEF]%H:%M "
set -g status-right-length 150
